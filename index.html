<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">CodeCraft - Aventura Informática 1° Año</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Minecraft-inspired palette */
            --grass: #7CB342;
            --dirt: #8D6E63;
            --stone: #78909C;
            --diamond: #00E5FF;
            --emerald: #00E676;
            --gold: #FFD600;
            --redstone: #D32F2F;
            --lapis: #1976D2;
            --iron: #90A4AE;
            --coal: #212121;
            --wood: #A1887F;
            --obsidian: #1A237E;
            
            --bg-dark: #1a1a2e;
            --bg-medium: #16213e;
            --bg-light: #0f3460;
            --text-main: #ECEFF1;
            --text-glow: #00E5FF;
            
            --shadow-block: 4px 4px 0px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(0, 229, 255, 0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'VT323', monospace;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        /* Pixelated Background */
        .world-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                linear-gradient(0deg, transparent 24%, rgba(120, 144, 156, .05) 25%, rgba(120, 144, 156, .05) 26%, transparent 27%, transparent 74%, rgba(120, 144, 156, .05) 75%, rgba(120, 144, 156, .05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(120, 144, 156, .05) 25%, rgba(120, 144, 156, .05) 26%, transparent 27%, transparent 74%, rgba(120, 144, 156, .05) 75%, rgba(120, 144, 156, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: worldShift 20s linear infinite;
        }
        
        @keyframes worldShift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--diamond);
            box-shadow: 0 0 10px var(--diamond);
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        
        .minecraft-logo {
            text-align: center;
            margin-bottom: 3rem;
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .minecraft-logo h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: var(--emerald);
            text-shadow: 
                4px 4px 0px var(--grass),
                0 0 30px var(--emerald);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        
        .minecraft-logo .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--diamond);
            text-shadow: 2px 2px 0px var(--obsidian);
        }
        
        .login-container {
            background: var(--bg-medium);
            border: 4px solid var(--stone);
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 
                var(--shadow-block),
                inset 0 0 50px rgba(0, 229, 255, 0.1);
            position: relative;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(45deg, var(--diamond), var(--emerald), var(--gold), var(--redstone));
            z-index: -1;
            opacity: 0.3;
            filter: blur(10px);
        }

        .section-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            text-align: center;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .pixel-btn {
            background: var(--grass);
            border: 4px solid var(--emerald);
            color: white;
            padding: 1rem 2rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: var(--shadow-block);
            transition: all 0.1s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        
        .pixel-btn:hover {
            background: var(--emerald);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .pixel-btn:disabled {
            background: var(--stone);
            border-color: var(--iron);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .pixel-input {
            width: 100%;
            background: var(--bg-dark);
            border: 4px solid var(--stone);
            color: var(--text-main);
            padding: 1rem;
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            box-shadow: inset 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .pixel-input:focus {
            outline: none;
            border-color: var(--diamond);
            box-shadow: inset 2px 2px 0px rgba(0, 0, 0, 0.5), 0 0 15px var(--diamond);
        }

        .character-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .character-option {
            background: var(--bg-dark);
            border: 3px solid var(--stone);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .character-option:hover {
            border-color: var(--diamond);
            transform: translateY(-5px);
        }

        .character-option.selected {
            border-color: var(--emerald);
            background: rgba(0, 230, 118, 0.1);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
        }

        .character-option.selected::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            color: var(--emerald);
            font-size: 1.5rem;
            font-family: 'Press Start 2P', cursive;
        }

        .character-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .character-name {
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            color: var(--text-main);
        }
        
        /* Game Screen */
        .game-screen {
            display: none;
            min-height: 100vh;
        }
        
        .game-screen.active {
            display: block;
        }
        
        .game-header {
            background: var(--bg-medium);
            border-bottom: 4px solid var(--stone);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .player-avatar {
            font-size: 2.5rem;
            background: var(--bg-dark);
            padding: 0.5rem;
            border: 3px solid var(--emerald);
            box-shadow: var(--shadow-block);
        }
        
        .player-stats {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        
        .player-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            color: var(--emerald);
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .level-badge {
            background: linear-gradient(135deg, var(--gold), var(--emerald));
            padding: 0.3rem 0.8rem;
            border: 2px solid var(--coal);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            display: inline-block;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .xp-bar-container {
            background: var(--bg-dark);
            border: 2px solid var(--stone);
            height: 20px;
            width: 200px;
            position: relative;
            overflow: hidden;
        }
        
        .xp-bar {
            background: linear-gradient(90deg, var(--emerald), var(--diamond));
            height: 100%;
            transition: width 0.5s ease;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .xp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        .resources {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .resource {
            background: var(--bg-dark);
            border: 3px solid var(--stone);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
        }
        
        .resource-icon {
            font-size: 1.2rem;
        }

        .logout-btn {
            background: var(--redstone);
            border: 3px solid #8B0000;
            color: white;
            padding: 0.7rem 1.5rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: var(--shadow-block);
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .logout-btn:hover {
            background: #FF1744;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }

        .logout-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .lang-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 500;
            background: var(--bg-medium);
            border: 3px solid var(--diamond);
            color: var(--text-main);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65rem;
            padding: 0.6rem 1rem;
            cursor: pointer;
            box-shadow: var(--shadow-block);
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .lang-toggle:hover {
            transform: translate(2px, 2px);
            box-shadow: var(--shadow-glow);
            border-color: var(--text-glow);
        }

        .lang-toggle:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        @media (max-width: 600px) {
            .lang-toggle {
                top: 8px;
                right: 8px;
                font-size: 0.55rem;
                padding: 0.5rem 0.7rem;
            }
        }
        
        .game-nav {
            background: var(--bg-medium);
            border-bottom: 4px solid var(--stone);
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 0;
            overflow-x: auto;
        }
        
        .nav-tab {
            background: var(--bg-dark);
            border: none;
            border-right: 2px solid var(--stone);
            color: var(--text-main);
            padding: 1rem 2rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .nav-tab:hover {
            background: var(--bg-light);
        }
        
        .nav-tab.active {
            background: var(--grass);
            color: white;
            box-shadow: inset 0 4px 0 var(--emerald);
        }
        
        .game-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .world-section {
            display: none;
        }
        
        .world-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .world-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--emerald);
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .missions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .mission-card {
            background: var(--bg-medium);
            border: 4px solid var(--stone);
            padding: 1.5rem;
            box-shadow: var(--shadow-block);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .mission-card:hover {
            transform: translateY(-5px);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 229, 255, 0.2);
        }
        
        .mission-card.completed {
            border-color: var(--emerald);
            background: linear-gradient(135deg, var(--bg-medium), rgba(0, 230, 118, 0.1));
        }
        
        .mission-card.completed::before {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            color: var(--emerald);
            font-family: 'Press Start 2P', cursive;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }

        .mission-card.pending {
            border-color: var(--gold);
            background: linear-gradient(135deg, var(--bg-medium), rgba(255, 214, 0, 0.1));
        }

        .mission-card.pending::before {
            content: '⏳';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
        }
        
        .mission-difficulty {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            margin-bottom: 1rem;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
        }
        
        .difficulty-facil {
            background: var(--grass);
            border: 2px solid var(--emerald);
            color: white;
        }
        
        .difficulty-medio {
            background: var(--gold);
            border: 2px solid #FFA000;
            color: var(--coal);
        }
        
        .difficulty-dificil {
            background: var(--redstone);
            border: 2px solid #8B0000;
            color: white;
        }
        
        .mission-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: var(--diamond);
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .mission-desc {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .mission-rewards {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .reward {
            background: var(--bg-dark);
            border: 2px solid var(--stone);
            padding: 0.5rem 0.8rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .complete-btn {
            background: var(--grass);
            border: 3px solid var(--emerald);
            color: white;
            padding: 0.8rem 1.5rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: var(--shadow-block);
            transition: all 0.1s;
            width: 100%;
            text-transform: uppercase;
        }
        
        .complete-btn:hover {
            background: var(--emerald);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .complete-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .complete-btn:disabled {
            background: var(--stone);
            border-color: var(--iron);
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        /* Quests */
        .quests-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .quest-card {
            background: var(--bg-medium);
            border: 4px solid var(--gold);
            padding: 1.5rem;
            box-shadow: var(--shadow-block), 0 0 20px rgba(255, 214, 0, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .quest-card:hover {
            transform: translateY(-5px);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 214, 0, 0.3);
        }
        
        .quest-card.completed {
            border-color: var(--emerald);
            opacity: 0.7;
        }
        
        .quest-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .quest-desc {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .quest-rewards {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        
        .reward-item {
            background: var(--bg-dark);
            border: 2px solid var(--emerald);
            padding: 0.5rem 0.8rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Recipes/Crafteo */
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        
        .recipe-card {
            background: var(--bg-medium);
            border: 4px solid var(--stone);
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-block);
            transition: all 0.2s;
        }
        
        .recipe-card:hover {
            transform: translateY(-5px);
            border-color: var(--diamond);
        }
        
        .recipe-item {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .recipe-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: var(--diamond);
            margin-bottom: 1rem;
        }
        
        .recipe-cost {
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }
        
        .craft-btn {
            background: var(--lapis);
            border: 3px solid var(--diamond);
            color: white;
            padding: 0.8rem 1.5rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: var(--shadow-block);
            transition: all 0.1s;
            width: 100%;
            text-transform: uppercase;
        }
        
        .craft-btn:hover:not(:disabled) {
            background: var(--diamond);
            color: var(--coal);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .craft-btn:disabled {
            background: var(--stone);
            border-color: var(--iron);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        /* Achievements */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .achievement-card {
            background: var(--bg-medium);
            border: 4px solid var(--stone);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-block);
            transition: all 0.2s;
        }
        
        .achievement-card.unlocked {
            border-color: var(--gold);
            background: linear-gradient(135deg, var(--bg-medium), rgba(255, 214, 0, 0.1));
            box-shadow: var(--shadow-block), 0 0 20px rgba(255, 214, 0, 0.3);
        }
        
        .achievement-card.locked {
            opacity: 0.4;
        }
        
        .achievement-icon {
            font-size: 2.5rem;
        }
        
        .achievement-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }
        
        .achievement-desc {
            font-size: 1rem;
            color: var(--text-main);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-medium);
            border: 4px solid var(--gold);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(255, 214, 0, 0.5);
            position: relative;
        }
        
        .modal-header {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 2rem;
            text-align: center;
            line-height: 1.5;
        }
        
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--redstone);
            border: 3px solid #8B0000;
            color: white;
            width: 40px;
            height: 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .close-modal:hover {
            background: #FF1744;
        }
        
        .complete-mission-btn {
            background: var(--grass);
            border: 4px solid var(--emerald);
            color: white;
            padding: 1rem 2rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: var(--shadow-block);
            transition: all 0.1s;
            width: 100%;
            text-transform: uppercase;
            margin-top: 1rem;
        }
        
        .complete-mission-btn:hover:not(:disabled) {
            background: var(--emerald);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }
        
        .complete-mission-btn:disabled {
            background: var(--stone);
            border-color: var(--iron);
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        /* Notifications */
        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--bg-medium);
            border: 4px solid var(--emerald);
            padding: 1.5rem;
            max-width: 350px;
            box-shadow: var(--shadow-block), 0 0 30px rgba(0, 230, 118, 0.5);
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .notification-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: var(--emerald);
            margin-bottom: 0.5rem;
        }
        
        .notification-message {
            font-size: 1.1rem;
            color: var(--text-main);
        }
        
        /* Active Quests Sidebar */
        .active-quests {
            background: var(--bg-medium);
            border: 3px solid var(--gold);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-block);
        }
        
        .active-quests h3 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }
        
        .active-quest-item {
            background: var(--bg-dark);
            border: 2px solid var(--stone);
            padding: 1rem;
            margin-bottom: 0.8rem;
        }
        
        .active-quest-item:last-child {
            margin-bottom: 0;
        }
        
        .active-quest-title {
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            color: var(--diamond);
            margin-bottom: 0.5rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .xp-bar-container {
                width: 100%;
            }
            
            .missions-grid, .quests-container, .recipes-grid, .achievements-grid {
                grid-template-columns: 1fr;
            }
            
            .character-selection {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

        function t(key, ...args) {
            const dict = i18n[currentLang] || i18n.es;
            let entry = dict[key];
            if (entry === undefined) entry = i18n.es[key];
            return typeof entry === 'function' ? entry(...args) : entry;
        }
        
        // Returns the current-language version of a bilingual data field like {es, en}
        function tr(field) {
            if (field && typeof field === 'object') {
                return field[currentLang] ?? field.es;
            }
            return field;
        }
        
        function difficultyLabel(diff) {
            return t('difficulty_' + diff);
        }
        
        function applyStaticTranslations() {
            document.documentElement.lang = currentLang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const text = t(el.dataset.i18n);
                if (text !== undefined) el.textContent = text;
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const text = t(el.dataset.i18nPlaceholder);
                if (text !== undefined) el.placeholder = text;
            });
            const toggleBtn = document.getElementById('langToggle');
            if (toggleBtn) {
                toggleBtn.textContent = currentLang === 'es' ? '🌐 EN' : '🌐 ES';
            }
        }
        
        function toggleLanguage() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            localStorage.setItem('codecraft_lang', currentLang);
            applyStaticTranslations();
            if (gameState.player) {
                loadMissions();
                loadQuests();
                loadRecipes();
                loadAchievements();
                loadActiveQuests();
            }
        }
        
        // Game State Management
        class GameState {
            constructor() {
                this.loadState();
            }
            
            loadState() {
                const saved = localStorage.getItem('codecraft_players');
                this.players = saved ? JSON.parse(saved) : {};
                this.currentPlayer = localStorage.getItem('codecraft_current_player');
                
                if (this.currentPlayer && this.players[this.currentPlayer]) {
                    this.player = this.players[this.currentPlayer];
                } else {
                    this.player = null;
                }
            }
            
            saveState() {
                if (this.player) {
                    this.players[this.player.name] = this.player;
                    localStorage.setItem('codecraft_players', JSON.stringify(this.players));
                    localStorage.setItem('codecraft_current_player', this.player.name);
                }
            }
            
            createPlayer(name, character) {
                // Si el jugador ya existe, cargar su progreso
                if (this.players[name]) {
                    this.player = this.players[name];
                    this.currentPlayer = name;
                } else {
                    // Crear nuevo jugador
                    this.player = {
                        name: name,
                        character: character,
                        level: 1,
                        xp: 0,
                        xpToNextLevel: 100,
                        diamonds: 0,
                        emeralds: 0,
                        gold: 0,
                        completedMissions: [],
                        pendingMissions: [],
                        completedQuests: [],
                        craftedItems: [],
                        achievements: []
                    };
                    this.currentPlayer = name;
                }
                this.saveState();
            }
            
            logout() {
                this.player = null;
                this.currentPlayer = null;
                localStorage.removeItem('codecraft_current_player');
            }
            
            addXP(amount) {
                this.player.xp += amount;
                
                while (this.player.xp >= this.player.xpToNextLevel) {
                    this.player.xp -= this.player.xpToNextLevel;
                    this.player.level++;
                    this.player.xpToNextLevel = Math.floor(this.player.xpToNextLevel * 1.5);
                    
                    showNotification(t('notifLevelUp'), t('notifLevelUpMsg', this.player.level), 'success');
                }
                
                this.checkAchievements();
                this.saveState();
                updateUI();
            }
            
            addResources(resources) {
                if (resources.diamonds) this.player.diamonds += resources.diamonds;
                if (resources.emeralds) this.player.emeralds += resources.emeralds;
                if (resources.gold) this.player.gold += resources.gold;
                this.saveState();
                updateUI();
            }
            
            markMissionPending(missionId) {
                if (!this.player.pendingMissions.includes(missionId) && 
                    !this.player.completedMissions.includes(missionId)) {
                    this.player.pendingMissions.push(missionId);
                    this.saveState();
                    return true;
                }
                return false;
            }

            approveMission(missionId, code) {
                // Validar código: 3 letras + 1 número
                const pattern = /^[A-Za-z]{3}[0-9]$/;
                if (!pattern.test(code)) {
                    showNotification(t('notifWrongCode'), t('notifWrongCodeMsg'), 'error');
                    return false;
                }

                const mission = missionsData.find(m => m.id === missionId);
                if (!mission) return false;

                this.player.pendingMissions = this.player.pendingMissions.filter(id => id !== missionId);
                this.player.completedMissions.push(missionId);
                
                this.addXP(mission.xp);
                this.addResources(mission.rewards);
                
                showNotification(t('notifMissionApproved'), `+${mission.xp} XP`, 'success');
                
                this.checkAchievements();
                this.saveState();
                return true;
            }
            
            completeMission(missionId) {
                if (this.player.completedMissions.includes(missionId)) return false;
                
                const mission = missionsData.find(m => m.id === missionId);
                if (!mission) return false;
                
                this.player.completedMissions.push(missionId);
                this.addXP(mission.xp);
                this.addResources(mission.rewards);
                
                showNotification(t('notifMissionCompleted'), `+${mission.xp} XP`, 'success');
                
                this.checkAchievements();
                this.saveState();
                return true;
            }
            
            completeQuest(questId) {
                if (this.player.completedQuests.includes(questId)) return false;
                
                const quest = questsData.find(q => q.id === questId);
                if (!quest) return false;
                
                this.player.completedQuests.push(questId);
                this.addXP(quest.xp);
                this.addResources(quest.rewards);
                
                showNotification(t('notifChallengeCompleted'), `+${quest.xp} XP`, 'success');
                
                this.checkAchievements();
                this.saveState();
                return true;
            }
            
            craftItem(itemId) {
                if (this.player.craftedItems.includes(itemId)) return false;
                
                const recipe = recipesData.find(r => r.id === itemId);
                if (!recipe) return false;
                
                // Check if player has enough resources
                if (recipe.cost.diamonds && this.player.diamonds < recipe.cost.diamonds) return false;
                if (recipe.cost.emeralds && this.player.emeralds < recipe.cost.emeralds) return false;
                if (recipe.cost.gold && this.player.gold < recipe.cost.gold) return false;
                
                // Deduct resources
                if (recipe.cost.diamonds) this.player.diamonds -= recipe.cost.diamonds;
                if (recipe.cost.emeralds) this.player.emeralds -= recipe.cost.emeralds;
                if (recipe.cost.gold) this.player.gold -= recipe.cost.gold;
                
                this.player.craftedItems.push(itemId);
                
                showNotification(t('notifItemCrafted'), tr(recipe.name), 'success');
                
                this.checkAchievements();
                this.saveState();
                updateUI();
                return true;
            }
            
            checkAchievements() {
                const newAchievements = [];
                
                // Primera misión
                if (this.player.completedMissions.length >= 1 && !this.player.achievements.includes('ach1')) {
                    this.player.achievements.push('ach1');
                    newAchievements.push('ach1');
                }
                
                // Coleccionista
                if (this.player.diamonds >= 50 && !this.player.achievements.includes('ach2')) {
                    this.player.achievements.push('ach2');
                    newAchievements.push('ach2');
                }
                
                // Estudiante Dedicado
                if (this.player.completedMissions.length >= 5 && !this.player.achievements.includes('ach3')) {
                    this.player.achievements.push('ach3');
                    newAchievements.push('ach3');
                }
                
                // Craftero Experto
                if (this.player.craftedItems.length >= 3 && !this.player.achievements.includes('ach4')) {
                    this.player.achievements.push('ach4');
                    newAchievements.push('ach4');
                }
                
                // Guerrero
                if (this.player.completedQuests.length >= 1 && !this.player.achievements.includes('ach5')) {
                    this.player.achievements.push('ach5');
                    newAchievements.push('ach5');
                }
                
                // Maestro CodeCraft
                if (this.player.level >= 10 && !this.player.achievements.includes('ach6')) {
                    this.player.achievements.push('ach6');
                    newAchievements.push('ach6');
                }
                
                newAchievements.forEach(achId => {
                    const ach = achievementsData.find(a => a.id === achId);
                    showNotification(t('notifAchievementUnlocked'), tr(ach.name), 'achievement');
                });
                
                this.saveState();
            }
        }
        
        const gameState = new GameState();
        
        // Particle Effects
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {

                particle.className = 'particle';

                container.appendChild(particle);
            }
        }

                    this.classList.add('active');
                    
                    document.querySelectorAll('.world-section').forEach(s => s.classList.remove('active'));
                    document.getElementById(world).classList.add('active');
                });
            });
            
            // Auto-login if player exists
            if (gameState.player) {
                initializeGame();
            }
        });
        
        // Close modal on outside click
        document.getElementById('questModal').addEventListener('click', (e) => {
            if (e.target.id === 'questModal') {
                closeModal();
            }
        });
        
        // Enter key to start game
        document.getElementById('playerName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });
    </script>
</body>
</html>
